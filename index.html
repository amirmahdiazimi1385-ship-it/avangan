    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f8fafc;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tree Styles for WBS View */
        .tree-line::before {
            content: '';
            position: absolute;
            top: 24px;
            bottom: -15px;
            right: 23px;
            width: 2px;
            background-color: #cbd5e1;
            z-index: 0;
        }
        .tree-node-last::before { display: none; }
        .node-content { position: relative; z-index: 1; }
        
        /* Task Row Table Emulation */
        .task-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1.5fr 1fr 1.5fr;
            gap: 1rem;
            align-items: center;
        }
        @media (max-width: 1024px) {
            .task-row { grid-template-columns: 1fr; gap: 0.5rem; }
        }

        /* Custom Gantt Table Styles */
        .gantt-table {
            border-collapse: separate;
            border-spacing: 0;
        }
        .gantt-table th, .gantt-table td {
            border-bottom: 1px solid #e2e8f0;
            border-left: 1px solid #e2e8f0;
        }
        
        .gantt-sticky-col {
            position: sticky;
            right: 0;
            background-color: white;
            z-index: 20;
            border-left: 2px solid #cbd5e1 !important; 
        }
        .gantt-sticky-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background-color: white;
        }
        .gantt-sticky-header-top { z-index: 31; }
        
        .gantt-row:hover .gantt-sticky-col { background-color: #f8fafc; }
        
        /* Drag and Drop Helpers */
        .drag-over {
            border: 2px dashed #3b82f6 !important;
            background-color: #eff6ff !important;
        }
    </style>

    <script>
        const generateId = () => 'id_' + Math.random().toString(36).substr(2, 9);
        let taskCounter = 6; 
        const generateTaskCode = () => { taskCounter++; return 'TSK-' + taskCounter; };

        let teamMembers = ['بدون مسئول', 'مدیر عامل', 'مدیر مالی', 'مهندس شعاعی', 'نماینده شرکت', 'پیمانکار', 'مسئول HSE', 'تیم بازاریابی'];

        // Initial Data Structure
        let appData = {
            id: "root",
            title: "شرکت آونگان (نود مرکزی)",
            type: "main",
            description: "برنامه جامع ارتقا، اخذ صلاحیت‌ها و توسعه کسب‌وکارهای شرکت.",
            children: [
                {
                    id: "node_legal",
                    title: "احراز وضعیت حقوقی شرکت",
                    type: "mixed_node",
                    description: "بررسی و تکمیل اسناد حقوقی و ثبتی شرکت.",
                    tasks: [
                        { 
                            id: generateId(), code: "TSK-1", title: "بروزرسانی روزنامه رسمی", 
                            status: "completed", priority: "high", assignee: "مدیر مالی", 
                            startDate: "1403/05/01", endDate: "1403/05/05", progress: 100,
                            milestones: "ثبت در سامانه ثنا\nتایید نهایی مدارک"
                        },
                        { 
                            id: generateId(), code: "TSK-2", title: "تشکیل پرونده فیزیکی", 
                            status: "in_progress", priority: "medium", assignee: "نماینده شرکت", 
                            startDate: "1403/05/06", endDate: "1403/05/15", progress: 40,
                            milestones: "جمع‌آوری پوشه‌ها\nارسال به دبیرخانه"
                        }
                    ],
                    children: []
                },
                {
                    id: "node_marketing",
                    title: "تهیه سند مارکتینگ",
                    type: "mixed_node",
                    description: "تدوین استراتژی‌های بازاریابی و فروش",
                    tasks: [
                         { 
                            id: generateId(), code: "TSK-3", title: "برنامه‌ریزی تبلیغات تیر", 
                            status: "blocked", priority: "high", assignee: "تیم بازاریابی", 
                            startDate: "1403/05/12", endDate: "1403/05/22", progress: 0,
                            milestones: ""
                        },
                        { 
                            id: generateId(), code: "TSK-4", title: "پروژه کانال یابی در شبکه‌های اجتماعی", 
                            status: "blocked", priority: "high", assignee: "تیم بازاریابی", 
                            startDate: "1403/05/15", endDate: "1403/05/28", progress: 20,
                            milestones: ""
                        }
                    ],
                    children: []
                },
                {
                    id: "node_qualifications",
                    title: "صلاحیت‌ها و مجوزها",
                    type: "category",
                    description: "مسیر اخذ گواهینامه‌های لازم.",
                    children: [
                        {
                            id: "q_1",
                            title: "اخذ گواهینامه صلاحیت ایمنی (HSE)",
                            type: "qualification",
                            status: "in_progress",
                            priority: "high",
                            assignee: "مسئول HSE",
                            timeline: "۱ الی ۲ ماه",
                            description: "پیش‌شرط ورود به هر مناقصه و سامانه دولتی.",
                            details: "مرجع صادرکننده: وزارت کار.\nروند: گذراندن دوره ایمنی.",
                            tasks: [
                                {
                                    id: generateId(), code: "TSK-5", title: "سرچ منابع مطالعاتی", 
                                    status: "completed", priority: "high", assignee: "مهندس شعاعی", 
                                    startDate: "1403/04/28", endDate: "1403/04/31", progress: 100,
                                    milestones: ""
                                },
                                {
                                    id: generateId(), code: "TSK-6", title: "ثبت نام پرسنل در دوره ایمنی", 
                                    status: "in_progress", priority: "high", assignee: "مهندس شعاعی", 
                                    startDate: "1403/05/10", endDate: "1403/05/20", progress: 80,
                                    milestones: "سرچ منابع (انجام شده)\nثبت نام اولیه (در حال انجام)"
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        // UI State
        let expandedNodes = new Set(['root', 'node_legal', 'node_qualifications', 'q_1', 'node_marketing']);
        let editingNodes = new Set(); 
        let expandedAccordions = new Set(); 
        let expandedGanttNodes = new Set(['root', 'node_legal', 'node_qualifications', 'q_1', 'node_marketing']); // For Gantt toggle

        // Drag & Drop State
        let draggedNodeId = null;
        let draggedParentId = null;

        const statusOptions = {
            'not_started': { label: 'شروع نشده', color: 'bg-slate-100 text-slate-600 border-slate-300', btnClass: 'bg-slate-100 text-slate-600', ganttColor: 'bg-slate-400' },
            'in_progress': { label: 'جاری', color: 'bg-blue-50 text-blue-600 border-blue-200', btnClass: 'bg-blue-100 text-blue-700', ganttColor: 'bg-sky-400' },
            'completed': { label: 'انجام شده', color: 'bg-emerald-50 text-emerald-600 border-emerald-200', btnClass: 'bg-emerald-100 text-emerald-700', ganttColor: 'bg-emerald-500' },
            'blocked': { label: 'مسدود / تعویق', color: 'bg-rose-50 text-rose-600 border-rose-200', btnClass: 'bg-rose-100 text-rose-700', ganttColor: 'bg-rose-500' }
        };
        const priorityOptions = { 'high': 'بالا', 'medium': 'متوسط', 'low': 'پایین' };

        function findNodeAndParent(node, id, parent = null) {
            if (node.id === id) return { node, parent };
            if (node.children) {
                for (let child of node.children) {
                    let result = findNodeAndParent(child, id, node);
                    if (result) return result;
                }
            }
            return null;
        }
        function findNode(id) { const result = findNodeAndParent(appData, id); return result ? result.node : null; }

        function addChildNode(parentId, defaultType, event) {
            if(event) event.stopPropagation();
            const parent = findNode(parentId);
            if (!parent) return;
            if (!parent.children) parent.children = [];
            
            const newNode = {
                id: generateId(), 
                title: defaultType === 'qualification' ? "صلاحیت جدید" : "بخش جدید", 
                type: defaultType, 
                description: "", 
                children: []
            };

            if(defaultType === 'mixed_node' || defaultType === 'category') {
                newNode.tasks = [];
            } else if (defaultType === 'qualification') {
                newNode.status = 'not_started'; 
                newNode.priority = 'medium';
                newNode.assignee = 'بدون مسئول';
                newNode.timeline = '';
                newNode.details = '';
                newNode.tasks = [];
            }

            parent.children.push(newNode);
            expandedNodes.add(parentId);
            editingNodes.add(newNode.id); 
            if (defaultType === 'qualification') {
                expandedAccordions.add(newNode.id);
            }
            renderTree();
        }

        function deleteNodeConfirm(id, event) {
            if(event) event.stopPropagation();
            if(confirm("آیا از حذف این مورد و تمام زیرمجموعه‌ها و تسک‌های آن اطمینان دارید؟")) {
                const result = findNodeAndParent(appData, id);
                if (result && result.parent) {
                    result.parent.children = result.parent.children.filter(c => c.id !== id);
                    editingNodes.delete(id);
                    expandedNodes.delete(id);
                    expandedAccordions.delete(id);
                    renderTree();
                } else if (id === 'root') {
                    alert("نود اصلی (ریشه) قابل حذف نیست.");
                }
            }
        }

        function toggleGanttNode(id) {
            if(expandedGanttNodes.has(id)) expandedGanttNodes.delete(id);
            else expandedGanttNodes.add(id);
            renderCustomGantt();
        }

        function handleDragStart(event, nodeId, parentId) {
            if(editingNodes.has(nodeId)) { event.preventDefault(); return; } // No drag while editing
            draggedNodeId = nodeId;
            draggedParentId = parentId;
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', nodeId); // Required for Firefox
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.stopPropagation();
            const dropTarget = event.currentTarget;
            if(dropTarget) {
                dropTarget.classList.add('drag-over');
                // Remove from siblings to only highlight one
                Array.from(dropTarget.parentNode.children).forEach(sibling => {
                    if(sibling !== dropTarget) sibling.classList.remove('drag-over');
                });
            }
        }
        
        function handleDragLeave(event) {
            const dropTarget = event.currentTarget;
            if(dropTarget) dropTarget.classList.remove('drag-over');
        }

        function handleDrop(event, targetNodeId, targetParentId) {
            event.preventDefault();
            event.stopPropagation();
            
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

            if (!draggedNodeId || draggedNodeId === targetNodeId) return;

            // Only allow reordering within the same parent
            if (draggedParentId !== targetParentId || targetParentId === 'null') {
                alert('جابجایی فقط در بین هم‌رده‌های یک بخش امکان‌پذیر است.');
                return;
            }

            const parent = findNode(targetParentId);
            if (parent && parent.children) {
                const fromIndex = parent.children.findIndex(c => c.id === draggedNodeId);
                const toIndex = parent.children.findIndex(c => c.id === targetNodeId);

                if (fromIndex > -1 && toIndex > -1) {
                    const [movedNode] = parent.children.splice(fromIndex, 1);
                    parent.children.splice(toIndex, 0, movedNode);
                    renderTree();
                }
            }
            draggedNodeId = null;
            draggedParentId = null;
        }

    </script>

    <script>
        function switchTab(tabId) {
            document.getElementById('view-wbs').classList.replace('block', 'hidden');
            document.getElementById('view-gantt').classList.replace('flex', 'hidden');
            
            ['wbs', 'gantt'].forEach(id => {
                const btn = document.getElementById('tab-' + id);
                btn.classList.remove('bg-sky-900/50', 'text-sky-400', 'border-sky-400');
                btn.classList.add('text-slate-400', 'border-transparent');
            });

            const activeBtn = document.getElementById('tab-' + tabId);
            activeBtn.classList.add('bg-sky-900/50', 'text-sky-400', 'border-sky-400');
            activeBtn.classList.remove('text-slate-400', 'border-transparent');

            if(tabId === 'wbs') {
                document.getElementById('view-wbs').classList.replace('hidden', 'block');
                document.getElementById('page-title').innerText = "پروژه‌ها و تسک‌ها";
                renderTree();
            } else if (tabId === 'gantt') {
                document.getElementById('view-gantt').classList.replace('hidden', 'flex');
                document.getElementById('page-title').innerText = "زمان‌بندی و گانت چارت شمسی";
                renderCustomGantt();
            }
        }

        function toggleNodeExpansion(id, event) {
            if(event) event.stopPropagation();
            if (expandedNodes.has(id)) expandedNodes.delete(id);
            else expandedNodes.add(id);
            renderTree();
        }

        function toggleAccordion(id, event) {
            if(event && event.target.closest('button')) return;
            if (expandedAccordions.has(id)) expandedAccordions.delete(id);
            else expandedAccordions.add(id);
            renderTree();
        }

        function toggleEditMode(id, event) {
            if(event) event.stopPropagation();
            if (editingNodes.has(id)) editingNodes.delete(id);
            else editingNodes.add(id);
            if(editingNodes.has(id)) {
                expandedNodes.add(id); 
                expandedAccordions.add(id);
            }
            renderTree();
        }

        function updateNodeBasic(id, field, value) {
            const node = findNode(id);
            if (node) node[field] = value;
        }

        function addTask(nodeId) {
            const node = findNode(nodeId);
            if(node) {
                if(!node.tasks) node.tasks = [];
                const today = new Date();
                const jDate = jalaali.toJalaali(today);
                const todayStr = `${jDate.jy}/${String(jDate.jm).padStart(2,'0')}/${String(jDate.jd).padStart(2,'0')}`;

                node.tasks.push({ 
                    id: generateId(), code: generateTaskCode(),
                    title: "تسک جدید", status: "not_started", priority: "medium", 
                    assignee: "بدون مسئول", startDate: todayStr, endDate: todayStr, 
                    progress: 0, milestones: ""
                });
                renderTree();
            }
        }
        
        function removeTask(nodeId, taskId) {
            const node = findNode(nodeId);
            if(node && node.tasks) { node.tasks = node.tasks.filter(t => t.id !== taskId); renderTree(); }
        }
        
        function updateTask(nodeId, taskId, key, value) {
             const node = findNode(nodeId);
             const task = node.tasks.find(t => t.id === taskId);
             if(task) {
                 if(key === 'progress') task[key] = parseInt(value) || 0;
                 else task[key] = value;
             }
        }

        function initDatePickers() {
            jalaliDatepicker.startWatch({ time: false, hideAfterChange: true, showTodayBtn: true, showEmptyBtn: false });
            
            document.querySelectorAll('[data-jdp]').forEach(input => {
                input.addEventListener('change', function(e) {
                    const nodeId = this.getAttribute('data-node-id');
                    const taskId = this.getAttribute('data-task-id');
                    const field = this.getAttribute('data-field');
                    if(nodeId && taskId && field) {
                        updateTask(nodeId, taskId, field, this.value);
                    }
                });
            });
        }

        function renderTasksUI(node, isEditing) {
            if (!node.tasks || (node.tasks.length === 0 && !isEditing)) return '';
            
            let html = `<div class="mt-6">`;
            
            if (isEditing) {
                 html += `
                    <div class="flex justify-between items-center mb-4 bg-slate-100 p-2 rounded border border-slate-200">
                        <h4 class="text-sm font-bold text-slate-700"><i class="fas fa-list-check ml-2 text-primary"></i>مدیریت تسک‌ها</h4>
                        <button type="button" onclick="addTask('${node.id}')" class="text-xs bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-3 py-1.5 rounded shadow-sm font-medium transition-colors">
                            <i class="fas fa-plus ml-1 text-emerald-600"></i>افزودن تسک جدید
                        </button>
                    </div>
                    <div class="space-y-4">`;
                 
                 node.tasks.forEach(task => {
                     let statusOpts = Object.keys(statusOptions).map(k => `<option value="${k}" ${task.status === k ? 'selected' : ''}>${statusOptions[k].label}</option>`).join('');
                     let ownerOpts = teamMembers.map(m => `<option value="${m}" ${task.assignee === m ? 'selected' : ''}>${m}</option>`).join('');
                     if(task.assignee && !teamMembers.includes(task.assignee)) {
                         ownerOpts += `<option value="${task.assignee}" selected>${task.assignee} (حذف شده)</option>`;
                     }
                     
                     html += `

        function renderTree() {

        function parseJalaliStrToDate(jStr) {
            if(!jStr) return null;
            let parts = jStr.split('/');
            if(parts.length !== 3) return null;
            let jy = parseInt(parts[0], 10);
            let jm = parseInt(parts[1], 10);
            let jd = parseInt(parts[2], 10);
            if(isNaN(jy) || isNaN(jm) || isNaN(jd)) return null;
            
            let g = jalaali.toGregorian(jy, jm, jd);
            return new Date(g.gy, g.gm - 1, g.gd);
        }

        function getInitials(name) {
            if(!name || name === 'بدون مسئول' || name === 'نامشخص') return 'نا';
            const words = name.replace('مهندس ', '').split(' ').filter(w => w.trim() !== '');
            if(words.length === 1) return words[0].substring(0, 2);
            return (words[0][0] + words[1][0]).substring(0, 2);
        }

        const jMonthNames = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];

        function renderCustomGantt() {
            let flatRows = [];
            function flattenNode(node, depth) {
                let hasChildren = (node.tasks && node.tasks.length > 0) || (node.children && node.children.length > 0);
                let isExpanded = expandedGanttNodes.has(node.id);

                flatRows.push({ 
                    type: 'category', id: node.id, title: node.title, 
                    depth: depth, hasChildren: hasChildren, isExpanded: isExpanded 
                });
                
                if(isExpanded) {
                    if(node.tasks && node.tasks.length > 0) {
                        node.tasks.forEach(t => {
                            flatRows.push({
                                type: 'task', id: t.id, title: t.title, code: t.code,
                                assignee: t.assignee, progress: parseInt(t.progress) || 0,
                                status: t.status, startDateStr: t.startDate, endDateStr: t.endDate,
                                depth: depth + 1
                            });
                        });
                    }
                    
                    if (node.children) {
                        node.children.forEach(c => flattenNode(c, depth + 1));
                    }
                }
            }
            flattenNode(appData, 0);

            // جستجوی تاریخ در کل دیتای پروژه (مستقل از باز یا بسته بودن نودها)
            let allTasksWithDates = [];
            function findDatesInTree(node) {
                if (node.tasks && node.tasks.length > 0) {
                    node.tasks.forEach(t => {
                        if (t.startDate && t.endDate) {
                            allTasksWithDates.push(t);
                        }
                    });
                }
                if (node.children) {
                    node.children.forEach(findDatesInTree);
                }
            }
            findDatesInTree(appData); 
            
            if(allTasksWithDates.length === 0) {
                 document.getElementById('gantt-wrapper').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-slate-400 p-10"><i class="fas fa-calendar-times text-5xl mb-4 text-slate-300"></i><p class="font-bold text-lg">هیچ تسکی با تاریخ مشخص در کل پروژه یافت نشد.</p></div>';
                 return;
            }

            let minDateObj = null, maxDateObj = null;
            allTasksWithDates.forEach(t => {
                let s = parseJalaliStrToDate(t.startDate);
                let e = parseJalaliStrToDate(t.endDate);
                if(s && e && s > e) { let temp = s; s = e; e = temp; }
                
                if(s) { if(!minDateObj || s < minDateObj) minDateObj = new Date(s); }
                if(e) { if(!maxDateObj || e > maxDateObj) maxDateObj = new Date(e); }
            });

            if(!minDateObj || !maxDateObj) return;

            const DAY_MS = 24 * 60 * 60 * 1000;
            let startCalendar = new Date(minDateObj.getTime() - (5 * DAY_MS));
            let endCalendar = new Date(maxDateObj.getTime() + (15 * DAY_MS));

            let daysArr = [];
            let current = new Date(startCalendar);
            while(current <= endCalendar) {
                let jd = jalaali.toJalaali(current);
                daysArr.push({
                    dateObj: new Date(current),
                    gTime: current.getTime(),
                    jy: jd.jy, jm: jd.jm, jd: jd.jd,
                    monthName: jMonthNames[jd.jm - 1],
                    dayOfWeek: current.getDay(),
                    isFriday: current.getDay() === 5 
                });
                current = new Date(current.getTime() + DAY_MS);
            }

            let monthsGroups = [];
            let currentGroup = null;
            daysArr.forEach(d => {
                let monthLabel = `${d.monthName} ${d.jy}`;
                if(!currentGroup || currentGroup.label !== monthLabel) {
                    currentGroup = { label: monthLabel, span: 0 };
                    monthsGroups.push(currentGroup);
                }
                currentGroup.span++;
            });

            const CELL_WIDTH = 40; 
            let html = `<table class="gantt-table w-full min-w-max text-sm bg-white">`;
            
            html += `<thead class="gantt-sticky-header">
                        <tr class="gantt-sticky-header-top bg-white">
                            <th rowspan="2" class="gantt-sticky-col w-64 min-w-[250px] p-4 text-right align-bottom text-slate-500 font-bold border-b-2 border-slate-300 shadow-[inset_0_-2px_0_rgba(203,213,225,1)] z-40">ساختار شکست / عنوان وظیفه</th>
            `;
            monthsGroups.forEach(m => {
                html += `<th colspan="${m.span}" class="p-2 border-b border-l border-slate-200 text-center font-bold text-slate-600 bg-slate-50">${m.label}</th>`;
            });
            html += `</tr><tr>`;
            
            daysArr.forEach(d => {
                const bg = d.isFriday ? 'bg-orange-50 text-orange-600 font-bold' : 'bg-white text-slate-500 font-normal';
                html += `<th class="p-1 border-b border-l border-slate-200 text-center text-[11px] min-w-[${CELL_WIDTH}px] ${bg}">${d.jd}</th>`;
            });
            html += `</tr></thead><tbody>`;

            flatRows.forEach(row => {
                html += `<tr class="gantt-row group transition-colors">`;
                
                let indent = row.depth * 16;
                if (row.type === 'category') {
                    let toggleBtn = row.hasChildren ? 
                        `<button onclick="toggleGanttNode('${row.id}')" class="w-5 h-5 inline-flex items-center justify-center mr-1.5 text-slate-400 hover:text-primary transition-colors cursor-pointer relative z-50 rounded bg-slate-100 hover:bg-sky-50 shadow-sm border border-slate-200"><i class="fas fa-chevron-${row.isExpanded ? 'down' : 'left'} text-[10px]"></i></button>` : 
                        `<span class="w-5 mr-1.5 inline-block"></span>`;

                    html += `
                        <td class="gantt-sticky-col p-3 border-b border-l border-slate-200 text-sm font-bold text-slate-800 bg-white hover:bg-slate-50 relative z-40" style="padding-right: ${indent + 12}px">
                            <div class="flex items-center relative z-50">
                                ${toggleBtn}
                                <i class="fas fa-folder text-slate-400 ml-1.5 text-xs"></i> 
                                <span class="truncate">${row.title}</span>
                            </div>
                        </td>
                        <td colspan="${daysArr.length}" class="p-0 border-b border-slate-200 bg-slate-50/50"></td>
                    `;
                } else {
                    html += `
                        <td class="gantt-sticky-col p-3 border-b border-l border-slate-200 text-xs font-medium text-slate-700 bg-white truncate hover:bg-slate-50 relative z-40" style="padding-right: ${indent + 24}px" title="${row.title}">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-800 text-[11px]"><span class="text-[9px] text-slate-500 bg-slate-100 px-1 rounded ml-1">${row.code}</span>${row.title}</span>
                                <span class="text-[10px] text-slate-400 mt-0.5"><i class="fas fa-user ml-1"></i>${row.assignee} | ${row.progress}%</span>
                            </div>
                        </td>
                        <td colspan="${daysArr.length}" class="p-0 border-b border-slate-200 bg-slate-50/50 relative">
                            <div class="absolute inset-0 flex h-full">
                    `;
                    
                    daysArr.forEach(d => {
                        let bg = d.isFriday ? 'bg-orange-50/30' : '';
                        html += `<div class="shrink-0 h-full border-l border-slate-100 ${bg}" style="width: ${CELL_WIDTH}px"></div>`;
                    });
                    html += `</div>`;
                    
                    if (row.startDateStr && row.endDateStr) {
                        let tStart = parseJalaliStrToDate(row.startDateStr);
                        let tEnd = parseJalaliStrToDate(row.endDateStr);
                        if(tStart && tEnd) {
                            if(tStart > tEnd) { let temp = tStart; tStart = tEnd; tEnd = temp; }
                            
                            let offsetMs = tStart.getTime() - startCalendar.getTime();
                            let offsetDays = offsetMs / DAY_MS;
                            let durationDays = ((tEnd.getTime() - tStart.getTime()) / DAY_MS) + 1;
                            
                            let rightPos = offsetDays * CELL_WIDTH;
                            let barWidth = durationDays * CELL_WIDTH;
                            
                            let sColor = statusOptions[row.status] ? statusOptions[row.status].ganttColor : 'bg-slate-400';
                            let initials = getInitials(row.assignee);
                            
                            html += `
                                <div class="absolute top-[8px] h-[32px] ${sColor} rounded flex items-center shadow-sm cursor-default hover:shadow-md transition-shadow group/bar border border-black/10 overflow-visible z-10" 
                                     style="right: ${rightPos}px; width: ${barWidth}px;" 
                                     title="شروع: ${row.startDateStr} | پایان: ${row.endDateStr} | پیشرفت: ${row.progress}%">
                                     
                                    <div class="flex-1 overflow-hidden px-2 text-white text-[10px] font-bold truncate">
                                        ${barWidth > 40 ? row.title : ''}
                                    </div>
                                    
                                    <div class="absolute bottom-0 right-0 h-1 bg-black/20" style="width: ${row.progress}%"></div>
                                    
                                    <div class="absolute -left-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-white border border-slate-300 flex items-center justify-center text-[9px] font-bold text-slate-700 shadow-sm z-20" title="مسئول: ${row.assignee}">
                                        ${initials}
                                    </div>
                                </div>
                            `;
                        }
                    }

                    html += `</td>`;
                }
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('gantt-wrapper').innerHTML = html;
        }

    </script>

    <!-- Team Management Modal -->
    <div id="team-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300 flex flex-col max-h-[80vh]" id="team-modal-content">
            <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                <h3 class="text-lg font-bold text-slate-800"><i class="fas fa-users text-primary ml-2"></i>مدیریت مسئولین (Owners)</h3>
                <button onclick="closeTeamModal()" class="text-slate-400 hover:text-rose-500 transition-colors bg-slate-50 w-8 h-8 rounded flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-team-member" class="flex-1 text-sm border border-slate-300 rounded-md px-3 py-2 outline-none focus:border-primary focus:ring-1 focus:ring-primary" placeholder="نام مسئول جدید را تایپ کنید..." onkeypress="if(event.key === 'Enter') addTeamMember()">
                <button onclick="addTeamMember()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md transition-colors text-sm font-medium shadow-sm"><i class="fas fa-plus ml-1"></i>افزودن</button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-1 space-y-2 custom-scrollbar" id="team-members-list">
            </div>
        </div>
    </div>

    <script>
        function openTeamModal() {
            renderTeamList();
            const modal = document.getElementById('team-modal');
            const content = document.getElementById('team-modal-content');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => { 
                modal.classList.remove('opacity-0'); 
                content.classList.remove('scale-95'); 
            }, 10);
        }

        function closeTeamModal() {
            const modal = document.getElementById('team-modal');
            const content = document.getElementById('team-modal-content');
            modal.classList.add('opacity-0'); 
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.replace('flex', 'hidden'); }, 300);
        }

        function renderTeamList() {
            const list = document.getElementById('team-members-list');
            list.innerHTML = '';
            teamMembers.forEach((member, index) => {
                if(member === 'بدون مسئول') return; 
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 hover:bg-slate-100 p-2.5 rounded-lg border border-slate-200 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white border border-slate-200 text-primary flex items-center justify-center text-xs font-bold shrink-0 shadow-sm">${getInitials(member)}</div>
                            <span class="text-sm font-bold text-slate-700">${member}</span>
                        </div>
                        <button onclick="removeTeamMember(${index})" class="text-rose-400 hover:text-rose-600 hover:bg-rose-50 w-8 h-8 rounded flex items-center justify-center transition-colors shadow-sm bg-white border border-slate-200" title="حذف شخص"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function addTeamMember() {
            const input = document.getElementById('new-team-member');
            const val = input.value.trim();
            if(val && !teamMembers.includes(val)) {
                teamMembers.push(val);
                input.value = '';
                renderTeamList();
                renderTree(); 
            } else if (teamMembers.includes(val)) {
                alert('این نام قبلاً در لیست ثبت شده است.');
            }
        }

        function removeTeamMember(index) {
            if(confirm('آیا از حذف این شخص اطمینان دارید؟ \nتسک‌های قبلی او در سیستم تغییر نخواهند کرد اما این شخص دیگر در منوی کشویی قابل انتخاب نخواهد بود.')) {
                teamMembers.splice(index, 1);
                renderTeamList();
                renderTree(); 
            }
        }
    </script>

    <!-- اتصال به سرور ابری گوگل شیت -->
    <script>
        // لینک وب اپلیکیشن گوگل شیت شما
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR4IkLlDZ7q0f29cVHKqt8x2x6MrLsdQZ4gbbYfQSTk-iNDAIJl_ujdRwWXUT6w9RP/exec';

        // تابع لود کردن اطلاعات در زمان باز شدن صفحه
        function loadDataFromCloud() {
            const btn = document.getElementById('load-btn');
            if(btn) btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'empty' && data.appData) {
                    appData = data.appData;
                    if(data.teamMembers) teamMembers = data.teamMembers;
                }
                renderTree();
            })
            .catch(error => {
                console.error('Error loading data:', error);
                // در صورت خطا همان دیتای پیش‌فرض داخل فایل نمایش داده می‌شود
                renderTree();
            })
            .finally(() => {
                if(btn) btn.innerHTML = '<i class="fas fa-sync-alt"></i>';
            });
        }

        // تابع ذخیره سازی
        function saveDataToCloud() {
            const btn = document.getElementById('save-btn');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> در حال ارسال...';
            btn.disabled = true;
            btn.classList.replace('bg-emerald-600', 'bg-emerald-400');

            const payload = {
                appData: appData,
                teamMembers: teamMembers
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    alert('تغییرات با موفقیت در فضای ابری ثبت شد.');
                } else {
                    alert('خطا در ذخیره‌سازی: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('درخواست ارسال شد اما در دریافت پاسخ مشکلی به وجود آمد (احتمالا به دلیل CORS در مرورگر).');
            })
            .finally(() => {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.replace('bg-emerald-400', 'bg-emerald-600');
            });
        }

        // Initialize App
        window.onload = function() { 
            loadDataFromCloud(); 
        };

        function downloadOfflineDashboard() {
            // ۱. گرفتن کل کد HTML همین صفحه
            let currentHTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            
            // ۲. تزریق اطلاعات فعلی به انتهای فایل برای استفاده آفلاین
            const injectedScript = `
                <script>
                    // جایگزینی متغیرها با آخرین اطلاعات موجود در رم
                    appData = ${JSON.stringify(appData)};
                    teamMembers = ${JSON.stringify(teamMembers)};
                    
                    // جلوگیری از لود شدن مجدد کلود در نسخه آفلاین
                    window.onload = function() { 
                        renderTree(); 
                    };
                <\/script>
            `;
            
            // ۳. جایگذاری اسکریپت قبل از تگ پایانی body
            currentHTML = currentHTML.replace('</body>', injectedScript + '\n</body>');
            
            // ۴. ساخت فایل و دانلود آن
            const blob = new Blob([currentHTML], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // ایجاد نام فایل بر اساس تاریخ شمسی فعلی
            const jDate = jalaali.toJalaali(new Date());
            const dateStr = `${jDate.jy}-${String(jDate.jm).padStart(2, '0')}-${String(jDate.jd).padStart(2, '0')}`;
            
            a.download = `dashboard-offline-${dateStr}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
